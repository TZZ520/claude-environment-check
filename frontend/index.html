<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="color-scheme" content="dark light"><title>Claude Environment Check</title><style>#boot-fallback{display:none;font:15px system-ui;padding:40px;color:#eef;background:#080d19;min-height:100vh}#boot-fallback pre{white-space:pre-wrap;color:#ff9cac}</style></head><body><div id="root"></div><div id="boot-fallback"><h1>Claude Environment Check</h1><p>界面加载失败 / UI failed to load.</p><pre id="boot-error">WebView2 did not execute the application bundle.</pre><p>日志 / Log: %LOCALAPPDATA%\ClaudeEnvironmentCheck\startup.log</p></div><script>window.__cecErrors=[];window.addEventListener('error',function(e){window.__cecErrors.push(String(e.message||e.error||'unknown script error'))});setTimeout(function(){var r=document.getElementById('root');if(!r||!r.children.length){document.getElementById('boot-fallback').style.display='block';document.getElementById('boot-error').textContent=window.__cecErrors.join('\n')||'The React application did not mount within 5 seconds.'}},5000)</script><script type="module" src="/src/main.tsx"></script></body></html>
