name: unsigned-nightly
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: windows-amd64-unsigned
          - os: macos-latest
            artifact: macos-universal-unsigned
          - os: ubuntu-22.04
            artifact: linux-amd64-unsigned
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.24.x' }
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
      - run: npm ci && npm run build
        working-directory: frontend
      - run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
      - run: wails build -clean
      - run: go build -trimpath -o build/bin/claude-env-check ./cmd/claude-env-check
      - run: go build -trimpath -o build/bin/probe-server ./cmd/probe-server
      - if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y; makensis packaging/windows/installer.nsi
      - if: runner.os == 'Linux'
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.41.3
          ARCH=amd64 nfpm package --config packaging/nfpm.yaml --packager deb --target build/bin/
          ARCH=amd64 nfpm package --config packaging/nfpm.yaml --packager rpm --target build/bin/
      - if: runner.os == 'macOS'
        run: |
          if [ -d build/bin/ClaudeEnvironmentCheck.app ]; then
            hdiutil create -volname "Claude Environment Check" -srcfolder build/bin/ClaudeEnvironmentCheck.app -ov -format UDZO build/bin/ClaudeEnvironmentCheck-unsigned.dmg
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/**
